name: Build Linux

on:
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libgtk-4-dev libepoxy-dev libx11-dev \
            libtirpc-dev libltdl-dev python3-venv \
            autoconf automake autoconf-archive \
            freetds-dev libgnutls28-dev libkrb5-dev

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "77df67cfff9c12ccfdb52284e07c87c75092f723"

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build_release/vcpkg_installed
          key: vcpkg-installed-linux-${{ hashFiles('vcpkg.json') }}-0a434205
          restore-keys: |
            vcpkg-installed-linux-

      - name: Inject secrets into APP_METADATA
        run: |
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> APP_METADATA
          echo "POLAR_ORGANIZATION_ID=${{ secrets.POLAR_ORGANIZATION_ID }}" >> APP_METADATA
          echo "CREDS_SECRET=${{ secrets.CREDS_SECRET }}" >> APP_METADATA

      - name: Debug cache env
        run: |
          echo "ACTIONS_CACHE_URL is set: $([ -n "$ACTIONS_CACHE_URL" ] && echo yes || echo no)"
          echo "VCPKG_BINARY_SOURCES: $VCPKG_BINARY_SOURCES"

      - name: Build and package
        run: |
          export CMAKE_GENERATOR=Ninja
          ./scripts/build release

      - name: Set env vars
        run: |
          VERSION=$(grep '^APP_VERSION=' APP_METADATA | cut -d= -f2)
          APP_NAME=$(grep '^APP_NAME=' APP_METADATA | cut -d= -f2)
          APPIMAGE_NAME="${APP_NAME}-${VERSION}-x86_64.AppImage"
          VERSION_METADATA_NAME="version.json"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "APPIMAGE_NAME=${APPIMAGE_NAME}" >> "$GITHUB_ENV"
          echo "VERSION_METADATA_NAME=${VERSION_METADATA_NAME}" >> "$GITHUB_ENV"

      - name: Create version metadata file
        run: |
          SHA256=$(cut -d' ' -f1 "build_release/${APPIMAGE_NAME}.sha256")
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/${APPIMAGE_NAME}"
          METADATA_PATH="build_release/${VERSION_METADATA_NAME}"

          cat > "$METADATA_PATH" <<EOF
          {
            "version": "${VERSION}",
            "release_notes": "",
            "downloads": {
              "appimage-x86_64": {
                "url": "${DOWNLOAD_URL}",
                "sha256": "${SHA256}"
              }
            }
          }
          EOF

          echo "Created ${METADATA_PATH}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dearsql-linux-appimage
          path: |
            build_release/${{ env.APPIMAGE_NAME }}
            build_release/${{ env.VERSION_METADATA_NAME }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build_release/${{ env.APPIMAGE_NAME }}
            build_release/${{ env.VERSION_METADATA_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
