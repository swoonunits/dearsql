name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install gperf
        shell: pwsh
        run: choco install gperf --version=3.1 -y --no-progress

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "77df67cfff9c12ccfdb52284e07c87c75092f723"

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build_release/vcpkg_installed
          key: vcpkg-installed-windows-${{ hashFiles('vcpkg.json') }}-ca6170b7
          restore-keys: |
            vcpkg-installed-windows-

      - name: Inject secrets into APP_METADATA
        run: |
          Add-Content APP_METADATA "SENTRY_DSN=${{ secrets.SENTRY_DSN }}"
          Add-Content APP_METADATA "POLAR_ORGANIZATION_ID=${{ secrets.POLAR_ORGANIZATION_ID }}"
          Add-Content APP_METADATA "CREDS_SECRET=${{ secrets.CREDS_SECRET }}"

      - name: Debug cache env
        run: |
          Write-Host "ACTIONS_CACHE_URL is set: $([string]::IsNullOrEmpty($env:ACTIONS_CACHE_URL) ? 'no' : 'yes')"
          Write-Host "VCPKG_BINARY_SOURCES: $env:VCPKG_BINARY_SOURCES"

      - name: Build and package
        run: .\scripts\build-msi.ps1

      - name: Set env vars
        run: |
          $version = "$env:GITHUB_REF_NAME" -replace '^v',''
          $appName = ((Select-String -Path APP_METADATA -Pattern '^APP_NAME=').Line -split '=', 2)[1]
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MSI_NAME=$appName-x64.msi" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dearsql-windows-msi
          path: build_release/${{ env.MSI_NAME }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build_release/${{ env.MSI_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
